apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - name: s3
      port: 8333
      targetPort: 8333
    - name: filer
      port: 8888
      targetPort: 8888
    - name: master
      port: 9333
      targetPort: 9333
  selector:
    app: seaweedfs

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: seaweedfs
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: seaweedfs
  template:
    metadata:
      labels:
        app: seaweedfs
    spec:
      containers:
        - name: seaweedfs
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args:
            - server
            - -s3
            - -s3.iam.config=/etc/seaweedfs/iam.json
            - -ip.bind=0.0.0.0
            - -dir=/data
          env:
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.s3.accessKey }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.s3.secretKey }}
          ports:
            - name: s3
              containerPort: 8333
            - name: master
              containerPort: 9333
            - name: filer
              containerPort: 8888
          readinessProbe:
            tcpSocket:
              port: 8333
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
            - name: iam-config
              mountPath: /etc/seaweedfs
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
        - name: iam-config
          configMap:
            name: {{ .Release.Name }}-iam
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.storage.size }}

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
      sectionName: http
  hostnames:
    - trino.localhost
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            port: {{ .Values.gateway.httpsNodePort }}
            statusCode: 301

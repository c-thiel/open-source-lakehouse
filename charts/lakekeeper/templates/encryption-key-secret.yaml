{{/*
  Default encryption key for development/workshop use.

  For production, replace this with a SealedSecret:

    kubectl create secret generic lakekeeper-encryption-key \
      --namespace lakekeeper --dry-run=client -o yaml \
      --from-literal=encryptionKey=$(openssl rand -base64 32) \
      | kubeseal --format yaml > sealed-encryption-key.yaml

  Then delete this template and apply the SealedSecret instead.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: lakekeeper-encryption-key
type: Opaque
stringData:
  encryptionKey: "ChangeThisPostgresEncryptionKey!"

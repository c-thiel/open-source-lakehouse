apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-create-bucket
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-bucket
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - /bin/sh
            - -c
            - |
              for i in $(seq 1 30); do
                mc alias set myminio http://{{ .Release.Name }}:9000 {{ .Values.rootUser }} {{ .Values.rootPassword }} && break
                echo "Waiting for MinIO..."
                sleep 5
              done
              mc mb --ignore-existing myminio/{{ .Values.bucket }}
              echo "Bucket '{{ .Values.bucket }}' ready"

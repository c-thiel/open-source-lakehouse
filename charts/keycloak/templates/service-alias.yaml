{{/*
  Alias service so that in-cluster traffic to keycloak.localtest.me
  (via CoreDNS rewrite) reaches Keycloak on both ports.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-alias
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 30080
      targetPort: 8080
    - name: https
      port: 30443
      targetPort: 8080
  selector:
    app: keycloak

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
spec:
  parentRefs:
    - name: eg
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - starrocks.localhost
  rules:
    - backendRefs:
        - name: {{ .Release.Name }}
          port: 8030

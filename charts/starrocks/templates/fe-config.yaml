apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-fe-config
data:
  fe.conf: |
    # OAuth2 / JWT authentication for StarRocks FE.
    # Users present a Keycloak JWT; StarRocks validates it and forwards the
    # same token to Iceberg REST catalogs configured with security = jwt.
    oauth2_auth_server_url = {{ .Values.oauth2.authServerUrl }}
    oauth2_token_server_url = {{ .Values.oauth2.tokenServerUrl }}
    oauth2_jwks_url = {{ .Values.oauth2.jwksUrl }}
    oauth2_required_issuer = {{ .Values.oauth2.issuer }}
    oauth2_required_audience = {{ .Values.oauth2.audience }}
    oauth2_principal_field = {{ .Values.oauth2.principalField }}
    oauth2_client_id = {{ .Values.oauth2.clientId }}
    oauth2_client_secret = {{ .Values.oauth2.clientSecret }}
    oauth2_redirect_url = {{ .Values.oauth2.redirectUrl }}

    # JWT (bearer token) authentication — for clients that already hold
    # a Keycloak-issued JWT (e.g. the workshop python scripts).
    jwt_jwks_url = {{ .Values.oauth2.jwksUrl }}
    jwt_required_issuer = {{ .Values.oauth2.issuer }}
    jwt_required_audience = {{ .Values.oauth2.audience }}
    jwt_principal_field = {{ .Values.oauth2.principalField }}

    # Disable query-triggered ANALYZE on external (Iceberg) tables. Otherwise
    # the first SELECT against any table fires a synchronous background stats
    # collection that holds the table lock for minutes — workshop attendees
    # would think StarRocks is broken on their first query.
    enable_query_trigger_analyze = false

    # TLS on the MySQL protocol (port 9030). MySQL clients that authenticate
    # with OIDC require a secure channel, so we terminate TLS directly in
    # StarRocks using a JKS keystore generated from a self-signed cert.
    ssl_keystore_location = /etc/starrocks/ssl/keystore.jks
    ssl_keystore_password = {{ .Values.ssl.keystorePassword }}
    ssl_key_password = {{ .Values.ssl.keystorePassword }}

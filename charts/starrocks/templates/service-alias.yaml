{{/*
  Alias service so that in-cluster traffic to starrocks.localtest.me:30080
  (via CoreDNS rewrite) reaches StarRocks FE HTTP on port 8030.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-alias
spec:
  type: ClusterIP
  ports:
    - port: 30080
      targetPort: 8030
  selector:
    app: starrocks
